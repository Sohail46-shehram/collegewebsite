{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="account-section">

    <div class="account-box">

        <div class="account-logo">
            🔐
        </div>

        <h2>Student Login</h2>

        <p>
            Sign in to access your Admission Portal
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="account-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit" class="account-btn">
                Login
            </button>

        </form>

        <div class="account-link">

            Don't have an account?

            <a href="{% url 'register' %}">
                Create Account
            </a>

        </div>

    </div>

</section>

{% endblock %}
